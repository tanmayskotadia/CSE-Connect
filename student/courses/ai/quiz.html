        <div class="question">
          <p>1. What is Artificial Intelligence?</p>
          <label><input type="radio" name="q1" value="0"> Human intelligence only</label>
          <label><input type="radio" name="q1" value="1"> Intelligence shown by machines</label>
          <label><input type="radio" name="q1" value="0"> Hardware technology</label>
          <label><input type="radio" name="q1" value="0"> Database system</label>
        </div>

        <div class="question">
          <p>2. An intelligent agent:</p>
          <label><input type="radio" name="q2" value="0"> Acts randomly</label>
          <label><input type="radio" name="q2" value="1"> Perceives and acts on environment</label>
          <label><input type="radio" name="q2" value="0"> Only stores data</label>
          <label><input type="radio" name="q2" value="0"> Executes fixed code</label>
        </div>

        <div class="question">
          <p>3. Which is a core AI area?</p>
          <label><input type="radio" name="q3" value="0"> Operating Systems</label>
          <label><input type="radio" name="q3" value="0"> Networking</label>
          <label><input type="radio" name="q3" value="1"> Search algorithms</label>
          <label><input type="radio" name="q3" value="0"> Compilers</label>
        </div>

        <button class="submit-btn" type="submit">Submit Quiz</button>

        <p id="result"></p>
