<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>CSEConnect | Faculty Dashboard</title>
  <link rel="stylesheet" href="faculty_dashboard.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

  <nav class="navbar">
    <div class="logo">CSEConnect <span class="badge">Faculty</span></div>
    <div class="nav-links">
      <a class="active">Dashboard</a>
      <a href="../home/index.html" id="logoutBtn">Logout</a>
    </div>
  </nav>

  <div class="container">
    <section class="welcome">
      <h1 id="facultyWelcome">Welcome, Faculty</h1>
      <p>Department of Computer Science & Engineering</p>
    </section>

    <div class="stats-row">
      <div class="stat-card">
        <h2 id="statAssigned">0</h2>
        <p>Assigned Courses</p>
      </div>
      <div class="stat-card">
        <h2 id="statLectures">0</h2>
        <p>Total Lectures</p>
      </div>
      <div class="stat-card">
        <h2 id="statPending">0</h2>
        <p>Pending Submissions</p>
      </div>
    </div>

    <section class="assigned-courses">
      <h3>Your Assigned Courses</h3>
      <div class="course-grid" id="facultyCourseGrid">
        <!-- Dynamically populated -->
      </div>
    </section>
  </div>

  <footer class="footer">
    &copy; 2026 CSEConnect&trade; &middot; Made by Tanmay Suresh Kotadia
  </footer>

  <script src="../lib/auth.js"></script>
  <script src="../lib/submissionUtils.js"></script>
  <script src="faculty_dashboard.js"></script>
</body>

</html>
