<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>CSEConnect | Student Submissions</title>

  <link rel="stylesheet" href="view_sub.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>
  <div class="pagewrapper">
    <nav class="navbar">
      <div class="logo">CSEConnect</div>
      <div class="nav-links">
        <a href="faculty_dashboard.html">Dashboard</a>
        <a class="active">Submissions</a>
        <a href="../home/index.html">Logout</a>
      </div>
    </nav>

    <div class="container">

      <a class="back" href="faculty_dashboard.html">

      <h1>Student Submissions</h1>
      <p class="subtitle" id="subSubtitle">Loading submissions...</p>

        </table>

    </div>

  </div>
  <script src="../lib/auth.js"></script>
